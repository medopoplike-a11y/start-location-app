<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000814" />
      <stop offset="100%" stop-color="#001E66" />
    </linearGradient>
    
    <!-- Design Gradients -->
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="grad-yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047" />
      <stop offset="100%" stop-color="#FACC15" />
    </linearGradient>
    
    <!-- Shadow & Glow -->
    <filter id="logo-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="512" height="512" rx="120" fill="url(#bg-grad)"/>
  <rect x="2" y="2" width="508" height="508" rx="118" stroke="white" stroke-opacity="0.1" stroke-width="4"/>

  <!-- Centered Fluid Pin Icon -->
  <g transform="translate(106, 66) scale(3)" filter="url(#logo-shadow)">
    <!-- Layer 1 - Outer Blue -->
    <path 
      d="M50 5C30.67 5 15 20.67 15 40C15 55 50 120 50 120C50 120 85 55 85 40C85 20.67 69.33 5 50 5Z" 
      fill="url(#grad-blue)" 
    />
    
    <!-- Layer 2 - Inner Red Accent -->
    <path 
      d="M50 20C38.95 20 30 28.95 30 40C30 48 50 85 50 85C50 85 70 48 70 40C70 28.95 61.05 20 50 20Z" 
      fill="url(#grad-red)" 
    />

    <!-- Layer 3 - Core Yellow Point -->
    <path 
      d="M50 35C47.24 35 45 37.24 45 40C45 42 50 55 50 55C50 55 55 42 55 40C55 37.24 52.76 35 50 35Z" 
      fill="url(#grad-yellow)" 
    />

    <!-- Center Point - White Glow -->
    <circle cx="50" cy="40" r="5" fill="white" />
  </g>
</svg>
