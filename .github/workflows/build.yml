name: Build APK & Deploy Web

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
  RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
  RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
  RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

    steps:
    - uses: actions/checkout@v4

    - name: 🔍 Verify GitHub Secrets Presence
      run: |
        echo "Checking for required secrets (masking values)..."
        [ -n "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ] && echo "✅ NEXT_PUBLIC_SUPABASE_URL: [PRESENT]" || echo "❌ NEXT_PUBLIC_SUPABASE_URL: [MISSING]"
        [ -n "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ] && echo "✅ NEXT_PUBLIC_SUPABASE_ANON_KEY: [PRESENT]" || echo "❌ NEXT_PUBLIC_SUPABASE_ANON_KEY: [MISSING]"
        [ -n "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ] && echo "✅ SUPABASE_SERVICE_ROLE_KEY: [PRESENT]" || echo "❌ SUPABASE_SERVICE_ROLE_KEY: [MISSING]"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Required by Capacitor CLI
        cache: 'npm'

    - name: Install dependencies
      run: npm install --legacy-peer-deps
      env:
        NODE_OPTIONS: "--max-old-space-size=4096"

    - name: Build and Export for Mobile
      run: npm run build:mobile
      env:
        BUILD_TYPE: static
        NODE_OPTIONS: "--max-old-space-size=4096"

    - name: Create Update Bundle
      run: node scripts/create-ota-bundle.js

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21' # Matching the project's expectation for Gradle 8.x
        distribution: 'temurin'
        cache: 'gradle'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Prepare Android Signing
      run: |
        if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
          mkdir -p android/app
          node -e "const fs = require('fs'); try { fs.writeFileSync('android/app/release-key.keystore', Buffer.from(process.env.ANDROID_KEYSTORE_BASE64, 'base64')); console.log('✅ Keystore file created'); } catch(e) { console.error('❌ Failed to create keystore:', e); process.exit(1); }"
        else
          echo "⚠️ No Keystore found, building unsigned"
        fi
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

    - name: Build Android APK
      working-directory: ./android
      run: |
        chmod +x gradlew
        # Build Release (signed or unsigned)
        ./gradlew assembleRelease --stacktrace --no-daemon --console=plain -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
      env:
        RELEASE_STORE_FILE: release-key.keystore
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

    - name: Prepare Assets for Deployment
      run: |
        mkdir -p build-out
        
        # 1. Copy OTA bundle
        if [ -f "dist/update.zip" ]; then
          cp dist/update.zip build-out/update.zip
          echo "✅ update.zip ready"
        fi
        
        # 2. Find and copy APK
        APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)
        if [ -n "$APK_PATH" ]; then
          cp "$APK_PATH" build-out/start-location.apk
          echo "✅ APK ready: $APK_PATH"
        else
          echo "❌ No APK found!"
          exit 1
        fi

    - name: Ensure Storage Buckets Exist
      run: node scripts/setup-storage.mjs

    - name: Upload to Supabase Storage
      run: |
        cd build-out
        node ../scripts/upload-to-supabase.mjs

    - name: Update Version in Database
      run: node scripts/update-ota-version.mjs

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: build-out/
        retention-days: 5

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build-out/start-location.apk
          build-out/update.zip
        name: Build v${{ github.run_number }}
        tag_name: build-v${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Deploy to Vercel
      if: github.ref == 'refs/heads/main'
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'
        working-directory: .

