name: Start Location Build & Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Next.js Static Export
        run: npm run export
        env:
          BUILD_TYPE: static
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Create OTA Bundle
        run: node scripts/create-ota-bundle.js

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Prepare Keystore (Base64 Decode)
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            mkdir -p android/app
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-key.keystore
            echo "✅ Keystore generated successfully"
          else
            echo "⚠️ No keystore found, skipping signing setup"
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build Android APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          # Build Release (signed or unsigned fallback)
          ./gradlew assembleRelease --stacktrace --no-daemon --max-workers=1 --console=plain -Dorg.gradle.jvmargs="-Xmx4g"
        env:
          RELEASE_STORE_FILE: release-key.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Prepare Final Assets
        run: |
          mkdir -p build-out
          # Copy OTA bundle
          if [ -f "dist/update.zip" ]; then
            cp dist/update.zip build-out/update.zip
            echo "✅ OTA bundle ready"
          fi
          # Find and copy APK
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" build-out/start-location.apk
            echo "✅ APK ready: $APK_PATH"
          else
            echo "❌ No APK found!"
            exit 1
          fi

      - name: Install Supabase Tools
        run: npm install @supabase/supabase-js

      - name: Upload to Supabase & Update DB
        run: |
          node scripts/upload-to-supabase.mjs
          node scripts/update-ota-version.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
