name: Start Location Build & Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Next.js Static Export
        run: npm run export
        env:
          BUILD_TYPE: static
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Create OTA Bundle
        run: node scripts/create-ota-bundle.js

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Install Android SDK 36
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools" 2>/dev/null || true
          echo "✅ Android SDK 36 ready"

      - name: Accept Android SDK Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Prepare Keystore
        id: signing_check
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ "${#ANDROID_KEYSTORE_BASE64}" -gt 100 ]; then
            mkdir -p android/app
            node -e "const fs = require('fs'); fs.writeFileSync('android/app/release-key.keystore', Buffer.from(process.env.ANDROID_KEYSTORE_BASE64, 'base64'));"
            echo "✅ Keystore generated successfully"
            echo "has_keystore=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ No valid keystore found, building unsigned"
            echo "has_keystore=false" >> $GITHUB_OUTPUT
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build Android APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          # Absolute path for keystore to avoid any ambiguity
          export RELEASE_STORE_FILE="$(pwd)/app/release-key.keystore"
          # Build Release
          ./gradlew assembleRelease --stacktrace --no-daemon --max-workers=1 --console=plain -Dorg.gradle.jvmargs="-Xmx4g"
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Prepare Final Assets
        run: |
          mkdir -p build-out
          # Copy OTA bundle
          if [ -f "dist/update.zip" ]; then
            cp dist/update.zip build-out/update.zip
            echo "✅ OTA bundle ready"
          fi
          # Find and copy APK
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" build-out/start-location.apk
            echo "✅ APK ready: $APK_PATH"
          else
            echo "❌ No APK found!"
            exit 1
          fi

      - name: Upload to Supabase & Update DB
        run: |
          node scripts/upload-to-supabase.mjs
          node scripts/update-ota-version.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
