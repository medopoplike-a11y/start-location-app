name: Build APK & Deploy Web

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
  RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
  RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
  RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

    steps:
    - uses: actions/checkout@v4

    - name: 🔍 Verify GitHub Secrets Presence
      run: |
        echo "Checking for required secrets (masking values)..."
        [ -n "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ] && echo "✅ NEXT_PUBLIC_SUPABASE_URL: [PRESENT]" || echo "❌ NEXT_PUBLIC_SUPABASE_URL: [MISSING]"
        [ -n "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ] && echo "✅ NEXT_PUBLIC_SUPABASE_ANON_KEY: [PRESENT]" || echo "❌ NEXT_PUBLIC_SUPABASE_ANON_KEY: [MISSING]"
        [ -n "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ] && echo "✅ SUPABASE_SERVICE_ROLE_KEY: [PRESENT]" || echo "❌ SUPABASE_SERVICE_ROLE_KEY: [MISSING]"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Required by Capacitor CLI
        cache: 'npm'

    - name: Install dependencies
      run: npm install --legacy-peer-deps
      env:
        NODE_OPTIONS: "--max-old-space-size=4096"

    - name: Build and Export for Mobile
      run: npm run build:mobile
      env:
        BUILD_TYPE: static
        NODE_OPTIONS: "--max-old-space-size=4096"

    - name: Create Update Bundle
      run: node scripts/create-ota-bundle.js

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17' # Use Java 17 for better Gradle compatibility
        distribution: 'temurin'
        cache: 'gradle'

    - name: Prepare Android signing for release
      if: (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main') && env.ANDROID_KEYSTORE_BASE64 != ''
      run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const keystoreBase64 = process.env.ANDROID_KEYSTORE_BASE64;
          if (keystoreBase64 && keystoreBase64.length > 10) {
            const keystorePath = path.join('android', 'app', 'release-key.keystore');
            fs.writeFileSync(keystorePath, Buffer.from(keystoreBase64, 'base64'));
            console.log('✅ Keystore file created successfully at ' + keystorePath);
          } else {
            console.log('⚠️ Keystore secret is empty or invalid. Skipping signing setup.');
          }
          NODE

    - name: Build APK (Release or Debug)
      working-directory: ./android
      run: |
          chmod +x gradlew
          
          # Try Release first
          echo "🚀 Attempting Release Build..."
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            ./gradlew assembleRelease --stacktrace --no-daemon --max-workers=2 || echo "⚠️ Release build failed, falling back to Debug"
          else
            ./gradlew assembleRelease --stacktrace --no-daemon --max-workers=2 || echo "⚠️ Release build (unsigned) failed, falling back to Debug"
          fi
          
          # If no release APK, try Debug
          if [ ! -f "app/build/outputs/apk/release/app-release.apk" ] && [ ! -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            echo "🚀 Attempting Debug Build as fallback..."
            ./gradlew assembleDebug --stacktrace --no-daemon --max-workers=2
          fi
      env:
        RELEASE_STORE_FILE: release-key.keystore
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

    - name: Prepare Assets for Deployment
      run: |
        rm -rf build-out
        mkdir -p build-out
        
        # Copy OTA bundle
        if [ -f "dist/update.zip" ]; then
          cp dist/update.zip build-out/update.zip
          echo "✅ update.zip prepared"
        else
          echo "❌ update.zip not found!"
          exit 1
        fi
        
        # Find the best APK produced
        if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
          APK_SRC="android/app/build/outputs/apk/release/app-release.apk"
          echo "📦 Using Signed Release APK"
        elif [ -f "android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
          APK_SRC="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          echo "📦 Using Unsigned Release APK"
        elif [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
          APK_SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          echo "📦 Using Debug APK"
        else
          echo "❌ No APK found in any expected location!"
          find android/app/build/outputs/apk -name "*.apk" || echo "No APKs found at all"
          exit 1
        fi
        
        cp "$APK_SRC" build-out/start-location.apk
        echo "✅ APK prepared: $(ls -lh build-out/start-location.apk)"

    - name: Ensure Storage Buckets Exist
      run: node scripts/setup-storage.mjs

    - name: Upload to Supabase Storage
      run: |
        cd build-out
        node ../scripts/upload-to-supabase.mjs

    - name: Update Version in Database
      run: node scripts/update-ota-version.mjs

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: build-out/
        retention-days: 5

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build-out/start-location.apk
          build-out/update.zip
        name: Build v${{ github.run_number }}
        tag_name: build-v${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Deploy to Vercel
      if: github.ref == 'refs/heads/main'
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'
        working-directory: .

