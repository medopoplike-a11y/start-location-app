name: Build APK & Deploy Web

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
  RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
  RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
  RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Verify Supabase Connection
      run: |
        if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
          echo "⚠️ Warning: NEXT_PUBLIC_SUPABASE_URL not set"
        else
          echo "✅ Supabase URL configured"
        fi

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Build Next.js with Supabase
      run: |
        npm run export
        node fix-paths.js
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    - name: Sync to Capacitor
      run: npx cap sync android
    
    - name: Build APK (Debug)
      working-directory: ./android
      run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --warning-mode all --console=plain --no-daemon

    - name: Prepare Android signing for release
      if: (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main') && env.ANDROID_KEYSTORE_BASE64 != '' && env.RELEASE_STORE_PASSWORD != '' && env.RELEASE_KEY_ALIAS != '' && env.RELEASE_KEY_PASSWORD != ''
      run: |
          node - <<'NODE'
          const fs = require('fs');
          const input = process.env.ANDROID_KEYSTORE_BASE64 || '';
          const clean = input.replace(/\s+/g, '');
          fs.writeFileSync('keystore.jks', Buffer.from(clean, 'base64'));

          const props = [
            'RELEASE_STORE_FILE=../keystore.jks',
            `RELEASE_STORE_PASSWORD=${process.env.RELEASE_STORE_PASSWORD}`,
            `RELEASE_KEY_ALIAS=${process.env.RELEASE_KEY_ALIAS}`,
            `RELEASE_KEY_PASSWORD=${process.env.RELEASE_KEY_PASSWORD}`,
          ].join('\n');
          fs.writeFileSync('android/keystore.properties', props);
          NODE

    - name: Build APK Release
      if: (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main') && env.ANDROID_KEYSTORE_BASE64 != '' && env.RELEASE_STORE_PASSWORD != '' && env.RELEASE_KEY_ALIAS != '' && env.RELEASE_KEY_PASSWORD != ''
      working-directory: ./android
      run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace --warning-mode all --console=plain --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Create Release
      if: (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main') && env.ANDROID_KEYSTORE_BASE64 != '' && env.RELEASE_STORE_PASSWORD != '' && env.RELEASE_KEY_ALIAS != '' && env.RELEASE_KEY_PASSWORD != ''
      uses: softprops/action-gh-release@v2.6.1
      with:
        tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('release-{0}', github.run_number) }}
        name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('Release {0}', github.run_number) }}
        files: |
          android/app/build/outputs/apk/release/app-release.apk
          dist/update.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  deploy-web:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5
      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_ORG_ID != ''
        uses: amondnet/vercel-action@v42.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-comment: false
          vercel-args: '--prod'

  deploy-ota:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk # Just to ensure build was successful
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Build and Export for OTA
        run: npm run export
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          BUILD_TYPE: static
          
      - name: Fix Paths
        run: node fix-paths.js
        
      - name: Create ZIP Bundle
        run: node scripts/create-ota-bundle.js
        
      - name: Upload to Supabase Storage
        run: |
          curl -X POST "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/storage/v1/object/app-updates/update.zip" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Content-Type: application/zip" \
          -H "x-upsert: true" \
          --data-binary "@dist/update.zip"
          
      - name: Update App Version in DB
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/update-ota-version.mjs
