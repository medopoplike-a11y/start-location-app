name: Build APK & Deploy Web

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Verify Supabase Connection
      run: |
        if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
          echo "⚠️ Warning: NEXT_PUBLIC_SUPABASE_URL not set"
        else
          echo "✅ Supabase URL configured"
        fi

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Build Next.js with Supabase
      run: npm run build:mobile
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    - name: Create OTA bundle
      run: npm run build:ota

    - name: Sync to Capacitor
      run: npx cap sync android
    
    - name: Build APK (Debug)
      working-directory: ./android
      run: |
          chmod +x gradlew
          ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4.3.1
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2.0.4
      with:
        files: android/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
