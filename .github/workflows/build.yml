name: Build APK & Deploy Web

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Verify Supabase Connection
      run: |
        if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
          echo "⚠️ Warning: NEXT_PUBLIC_SUPABASE_URL not set"
        else
          echo "✅ Supabase URL configured"
        fi

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Build Next.js with Supabase
      run: npm run build:mobile
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    - name: Create OTA bundle
      run: npm run build:ota

    - name: Sync to Capacitor
      run: npx cap sync android
    
    - name: Build APK (Debug)
      working-directory: ./android
      run: |
          chmod +x gradlew
          ./gradlew assembleDebug

    - name: Prepare Android signing for release
      if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
      run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > keystore.jks
          cat <<'EOF' > android/keystore.properties
          RELEASE_STORE_FILE=../keystore.jks
          RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD
          RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS
          RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD
          EOF
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

    - name: Build APK Release
      if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
      working-directory: ./android
      run: |
          chmod +x gradlew
          ./gradlew assembleRelease
    
    - name: Upload APK
      uses: actions/upload-artifact@v4.3.1
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2.0.4
      with:
        files: |
          android/app/build/outputs/apk/release/app-release.apk
          dist/update.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
    - uses: actions/checkout@v5

    - name: Deploy to Vercel
      if: env.VERCEL_TOKEN != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_ORG_ID != ''
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        github-comment: false
        vercel-args: '--prod'
