name: Mobile Release + OTA

on:
  push:
    tags:
      - "v*"

jobs:
  release-mobile:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm mobile release tag trigger
        run: |
          echo "Mobile release workflow triggered on tag: ${GITHUB_REF_NAME}"
          echo "Commit: ${GITHUB_SHA}"
          echo "Event: ${GITHUB_EVENT_NAME}"
