name: Mobile Release + OTA

on:
  push:
    tags:
      - "v*"

jobs:
  release-mobile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web for mobile
        run: npm run build:mobile

      - name: Verify Android signing secrets
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "❌ ANDROID_KEYSTORE_BASE64 is not set"
            exit 1
          fi
          if [ -z "$RELEASE_STORE_PASSWORD" ]; then
            echo "❌ RELEASE_STORE_PASSWORD is not set"
            exit 1
          fi
          if [ -z "$RELEASE_KEY_ALIAS" ]; then
            echo "❌ RELEASE_KEY_ALIAS is not set"
            exit 1
          fi
          if [ -z "$RELEASE_KEY_PASSWORD" ]; then
            echo "❌ RELEASE_KEY_PASSWORD is not set"
            exit 1
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Create keystore and Gradle signing config
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystore.jks
          cat <<'EOF' > android/keystore.properties
RELEASE_STORE_FILE=../keystore.jks
RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD
RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS
RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD
EOF
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Build APK release
        working-directory: ./android
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Build OTA bundle
        run: npm run bundle:ota

      - name: Upload OTA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ota-update-zip
          path: dist/update.zip
          retention-days: 30

      - name: Upload bundle to Capgo (optional)
        if: ${{ secrets.CAPGO_TOKEN != '' }}
        run: |
          npm install -g @capgo/cli
          capgo login --apikey "${{ secrets.CAPGO_TOKEN }}"
          capgo bundle upload --app-id "com.start.location" --path "dist/update.zip"

      - name: Update app_config in Supabase (optional)
        if: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          FORCE="false"
          curl -sS -X PATCH \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/app_config?id=eq.1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "{\"latest_version\":\"${VERSION}\",\"force_update\":${FORCE}}"
