name: Build & Deploy Start-OS

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Static Web
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Fix Paths & Bundle OTA
        run: |
          node fix-paths.js
          mkdir -p dist
          cd out && zip -r ../dist/update.zip .
          cd ..

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Signed APK
        run: |
          chmod +x android/gradlew
          npx cap sync android
          cd android && ./gradlew assembleRelease

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/main')
        with:
          files: |
            android/app/build/outputs/apk/release/app-release-unsigned.apk
            dist/update.zip
          tag_name: v${{ github.run_number }}
          name: Start-OS Release v${{ github.run_number }}
          body: |
            🚀 تحديث جديد للنظام (Start-OS)
            - إضافة نظام التتبع في الخلفية (GPS)
            - تفعيل التحديثات التلقائية (OTA)
            - تحسين واجهة المستخدم (Silver Theme)
            - إصلاح أذونات الكاميرا وسجل المكالمات
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
