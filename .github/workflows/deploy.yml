name: 🚀 Deploy - GitHub → Vercel → Supabase

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: 🔗 Verify Supabase Connection
      env:
        SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      run: |
        if [ -z "$SUPABASE_URL" ]; then
          echo "❌ ERROR: NEXT_PUBLIC_SUPABASE_URL not set"
          exit 1
        fi
        echo "✅ Supabase configured: $SUPABASE_URL"

    - name: 🔗 Verify Vercel Connection
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      run: |
        if [ -z "$VERCEL_TOKEN" ]; then
          echo "❌ ERROR: VERCEL_TOKEN not set"
          exit 1
        fi
        echo "✅ Vercel configured"

    - name: 🏗️ Build Next.js App
      run: npm run build
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    - name: 📤 Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        scope: medopoplike-6086s-projects
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    - name: ✅ Deployment Complete
      run: |
        echo "🎉 Successfully deployed to Vercel!"
        echo "🔗 Connected to Supabase: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
        echo "📱 Web App: https://traestartzlum.vercel.app"
